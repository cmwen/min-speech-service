services:
  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      API_KEY: local-no-auth
      PRELOAD_MODELS: >-
        ["${STT_MODEL:-Systran/faster-distil-whisper-small.en}","${STT_MODEL_ZH_TW:-Systran/faster-whisper-small}","${TTS_MODEL:-speaches-ai/Kokoro-82M-v1.0-ONNX}","${TTS_MODEL_ZH_TW:-speaches-ai/piper-zh_CN-huayan-medium}"]
    volumes:
      - speaches-model-cache:/home/ubuntu/.cache

volumes:
  speaches-model-cache:
